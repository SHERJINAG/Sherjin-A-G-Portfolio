<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Cybernetic Mirrored 'S' Monogram -->
  <!-- Upper Curve / Segment -->
  <path d="M 70,35 C 70,20 30,20 30,35 C 30,45 70,55 70,65 C 70,80 30,80 30,65" 
        fill="none" 
        stroke="url(#glow-grad)" 
        stroke-width="12" 
        stroke-linecap="round" 
        filter="url(#neon)" />
  
  <!-- Inner Detail Lines for Futuristic Look -->
  <path d="M 65,35 C 65,25 35,25 35,35" 
        fill="none" 
        stroke="white" 
        stroke-width="2" 
        stroke-opacity="0.4" 
        stroke-linecap="round" />
  
  <path d="M 35,65 C 35,75 65,75 65,65" 
        fill="none" 
        stroke="white" 
        stroke-width="2" 
        stroke-opacity="0.4" 
        stroke-linecap="round" />

  <!-- Digital Accent Points -->
  <circle cx="30" cy="35" r="3" fill="white" />
  <circle cx="70" cy="65" r="3" fill="white" />
  
  <!-- Subtle Background Grid -->
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.1" stroke-dasharray="2 2" />
</svg>
